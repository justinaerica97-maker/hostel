{% extends 'base.html' %}
{% block title %}{{ title }} — {{ hostel.name }}{% endblock %}

{% block content %}
<div class="page-header">
  <div class="container">
    <div class="page-header-inner">
      <div>
        <h1><i class="fa-solid fa-door-open"></i> {{ title }}</h1>
        <p>{{ hostel.name }}</p>
      </div>
      <a href="{% url 'manage_rooms' hostel.pk %}" class="btn btn-gray"><i class="fa-solid fa-arrow-left"></i> Back to Rooms</a>
    </div>
  </div>
</div>

<div class="page-content">
  <div class="container" style="max-width:560px;">
    <div class="card">
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
            <div class="form-group">
              <label class="form-label">{{ field.label }}</label>
              {{ field }}
              {% for e in field.errors %}<div class="form-error">{{ e }}</div>{% endfor %}
            </div>
          {% endfor %}
          <div style="display:flex;gap:12px;margin-top:8px;">
            <button type="submit" class="btn btn-primary">
              <i class="fa-solid fa-save"></i> {% if room %}Update Room{% else %}Add Room{% endif %}
            </button>
            <a href="{% url 'manage_rooms' hostel.pk %}" class="btn btn-gray">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
