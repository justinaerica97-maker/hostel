{% extends 'base.html' %}
{% block title %}Sign In — Makerere Hostels{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:28px;">
      <div style="width:56px;height:56px;background:var(--blue-100);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:1.4rem;color:var(--blue-600);">
        <i class="fa-solid fa-right-to-bracket"></i>
      </div>
      <h1>Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your Makerere Hostels account</p>
    </div>

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter your username" autofocus required>
      </div>
      <div class="form-group">
        <label class="form-label" style="display:flex;justify-content:space-between;">
          Password
          <a href="{% url 'password_reset_request' %}" style="font-weight:400;font-size:0.8rem;">Forgot password?</a>
        </label>
        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:4px;">
        <i class="fa-solid fa-right-to-bracket"></i> Sign In
      </button>
    </form>

    <hr class="divider">
    <p class="text-center text-sm text-muted">Don't have an account? <a href="{% url 'register' %}">Register here</a></p>

  </div>
</div>
{% endblock %}
